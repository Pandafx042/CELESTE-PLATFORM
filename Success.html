<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful</title>

<style>

body{
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

svg{
width:140px;
margin-bottom:25px;
}

.circle{
stroke:#00ff40;
stroke-width:6;
fill:none;
stroke-linecap:round;
stroke-dasharray:345;
stroke-dashoffset:345;
animation:drawCircle 0.9s ease forwards;
}

.check{
stroke:#00ff40;
stroke-width:6;
fill:none;
stroke-linecap:round;
stroke-linejoin:round;
stroke-dasharray:80;
stroke-dashoffset:80;
animation:drawCheck 0.7s ease forwards;
animation-delay:1s;
}

@keyframes drawCircle{
to{stroke-dashoffset:0;}
}

@keyframes drawCheck{
to{stroke-dashoffset:0;}
}

.title{
font-size:28px;
font-weight:900;
margin-top:10px;
font-family: 'Plus Jakarta Sans', sans-serif;
}

.subtitle{
color:#aaa;
margin-top:6px;
margin-bottom:30px;
font-family: 'Plus Jakarta Sans', sans-serif;
}

.redirect{
display:flex;
align-items:center;
gap:10px;
font-size:16px;
font-family: 'Plus Jakarta Sans', sans-serif;
}

.spinner{
width:18px;
height:18px;
border:3px solid rgba(255,255,255,0.25);
border-top:3px solid #00ff40;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<svg viewBox="0 0 120 120">

<circle class="circle" cx="60" cy="60" r="55"/>

<path class="check" d="M35 65 L55 85 L90 40"/>

</svg>

<div class="title">PAYMENT SUCCESSFUL!</div>
<div class="subtitle">Your payment has been confirmed.</div>

<div class="redirect">
<div class="spinner"></div>
<span>Redirecting to Telegram to complete your enrollment....</span>
</div>

<script>

const userData = JSON.parse(localStorage.getItem("celesteUser")) || {};

const params = new URLSearchParams(window.location.search);
const reference = params.get("reference") || "N/A";

const message =
`🚀 Hello Coach, I have made my payment for Celeste activation, Here are my details:

👤 Name: ${userData.fullName}
🆔 Username: ${userData.username}
📧 Email: ${userData.email}
🤳 Phone: ${userData.phone}
💎 Plan: ${userData.plan}

🧾 Ref: ${reference}

✅ Status: PAID VIA PAYSTACK CHECK OUT!`;


const telegramLink =
"https://t.me/coachfavour01?text=" + encodeURIComponent(message);

setTimeout(()=>{
window.location.href = telegramLink;
},5000);

</script>

</body>
  </html>
